<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .bks-navbar {
            width: 100%;
            height: 15vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .utama {
            width: 100%;
            height: 100vh;
            background-color: navy;
        }

        .navbar {
            width: 90%;
            height: 9vh;
            background-color: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bks-hasil {
            width: 100%;
            height: 20vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2%;
        }

        .hasil {
            width: 70%;
            height: 15vh;
            background-color: white;
            border-radius: 5px;
        }

        .rat {
            width: 10%;
            height: 15vh;
            border-radius: 5px;
            background-color: white;
        }

        .rata-rata {
            text-align: center;
            font-weight: bold;
        }

        th {
            width: 5%;
        }

        .inp {
            width: 100%;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bks-inp {
            width: 80%;
            height: 20vh;
            background-color: white;
            border-radius: 5px;
        }

        input{
            transition: 0.3s ease;
        }

        input:hover {
            background-color: black;
        }

        .inpp {
            width: 100%;
            height: 10vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5%;
        }

        .inpp input {
            width: 20%;
            text-align: center;
            border-radius: 3px;
            border: 1px solid navy;
            height: 5vh;
        }

        .butt {
            width: 100%;
            height: 10vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .butt button {
            width: 15%;
            height: 5vh;
            background-color: navy;
            border-radius: 3px;
            color: black;
            border: none;
            transition: 0.5s ease-out;
            border: 2px solid black;
        }

        button:hover{
            width: 50%;
            border: 2px solid blue;
            transition: 0.5s ease-in;
            color: blue;
        }

        .butt button:hover {
            background-color: black;
            color: white;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            padding: 9px;
            text-align: center;
            font-weight: bold;
        }

        @media(max-width:667px) {
            .utama {
                height: 120vh;
            }

            .inp {
                height: 60vh;
            }

            .bks-inp {
                height: 50vh;
            }

            .inpp {
                height: 30vh;
                flex-wrap: wrap;
            }

            .butt {
                height: 20vh;
            }

            .inpp input {
                width: 90%;
            }

            .butt button {
                width: 50%;
            }

            .bks-hasil {
                height: 34vh;
                flex-wrap: wrap;
            }

            .hasil {
                width: 95%;
            }

            .rat {
                width: 40%;
                height: 15vh;
            }
        }
    </style>
</head>

<body>
    <div class="bungkus">
        <div class="utama">
            <div class="bks-navbar">
                <div class="navbar">
                    <h2>Aplikasi Add Nama Siswa</h2>
                </div>
            </div>
            <div class="inp">
                <div class="bks-inp">
                    <div class="inpp">
                        <input type="text" id="nama" placeholder="input nama siswa"
                            onkeypress="if(event.key === 'Enter') tambahSiswa()">
                        <input type="number" id="nilai" placeholder="input nilai siswa"
                            onkeypress="if(event.key === 'Enter') tambahSiswa()">
                        <input type="number" id="kehadiran" placeholder="input kehadiran siswa"
                            onkeypress="if(event.key === 'Enter') tambahSiswa()">
                    </div>
                    <div class="butt">
                        <button onclick="tambahSiswa()">Input Siswa</button>
                    </div>
                </div>
            </div>
            <div class="bks-hasil">
                <div class="hasil">
                    <table>
                        <tr>
                            <th>Nama</th>
                            <th>Nilai</th>
                            <th>Kehadiran</th>
                            <th>Grade</th>
                            <th>Status</th>
                        </tr>
                        <tbody id="tabelSiswa">

                        </tbody>
                    </table>
                </div>
                <div class="rat">
                    <div class="rata-rata" id="ratarata"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const daftarSiswa = [];

        function tambahSiswa() {
            const nama = document.getElementById('nama').value;
            const nilai = parseFloat(document.getElementById('nilai').value);
            const kehadiran = parseFloat(document.getElementById('kehadiran').value);

            if (nama === "" || isNaN(nilai) || isNaN(kehadiran)) {
                alert('Semua form harus terisi');
                return;
            }

            if (nilai > 100 || kehadiran < 0 || kehadiran > 100) {
                alert("Nilai dan kehadiran harus 10 s/d 100");
                return;
            }

            let grade = ""
            if (nilai >= 85) {
                grade = "A";
            } else if (nilai >= 75) {
                grade = "B";
            } else if (nilai > 60) {
                grade = "C";
            } else {
                grade = "D"
            }

            let status = "";
            if (nilai >= 70 && kehadiran >= 80) {
                status = "Lulus";
            } else {
                status = "Tidak Lulus";
            }

            const siswa = {
                nama,
                nilai,
                kehadiran,
                grade,
                status
            };

            daftarSiswa.push(siswa);
            tampilkanSiswa();
            hitungRataRata();

            document.getElementById('nama').value = "";
            document.getElementById('nilai').value = "";
            document.getElementById('kehadiran').value = "";
        }

        function tampilkanSiswa() {
            const tabel = document.getElementById('tabelSiswa');
            tabel.innerHTML = "";

            daftarSiswa.forEach(siswa => {
                const row = `
                
                    <tr>
                    <td>${siswa.nama}</td>
                    <td>${siswa.nilai}</td>
                    <td>${siswa.kehadiran}</td>
                    <td>${siswa.grade}</td>
                    <td>${siswa.status}</td>
                    </tr>

                 
                `;
                tabel.innerHTML += row;
            })
        }

        function hitungRataRata() {
            let total = 0;

            daftarSiswa.forEach(siswa => {
                total += siswa.nilai;
            });

            const rataRata = total / daftarSiswa.length;
            document.getElementById('ratarata').innerText = `
            Rata-rata Nilai siswa : ${rataRata.toFixed(2)}`
        }
    </script>
</body>

</html>
